<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS - Login & Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div id="alert-container" class="alert-container"></div>
  
  <div class="auth-container" style="max-width: 460px;">
    <div class="auth-header">
      <h2>📋 Complaint Management</h2>
      <p>Submit and track your complaints</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active-form">
      <div class="form-group">
        <label for="login-email">📧 Email Address</label>
        <input type="email" id="login-email" required placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label for="login-password">🔑 Password</label>
        <input type="password" id="login-password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">🔐 Sign In</button>
    </form>

    <!-- Enhanced Register Form -->
    <form id="register-form" class="auth-form">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div class="form-group">
          <label for="reg-name">👤 Full Name</label>
          <input type="text" id="reg-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="reg-register-number">🆔 Register Number</label>
          <input type="text" id="reg-register-number" required placeholder="REG2024001">
        </div>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div class="form-group">
          <label for="reg-phone">📱 Phone Number</label>
          <input type="tel" id="reg-phone" required placeholder="9876543210">
        </div>
        <div class="form-group">
          <label for="reg-email">📧 Gmail Address</label>
          <input type="email" id="reg-email" required placeholder="john@gmail.com">
        </div>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div class="form-group">
          <label for="reg-department">🏛️ Department</label>
          <select id="reg-department" required>
            <option value="">Select Department</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Information Technology">Information Technology</option>
            <option value="Electronics">Electronics</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Civil">Civil</option>
            <option value="Electrical">Electrical</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="reg-domain">💻 Domain</label>
          <select id="reg-domain" required>
            <option value="">Select Domain</option>
            <option value="Web Development">Web Development</option>
            <option value="AI/ML">AI / Machine Learning</option>
            <option value="Data Science">Data Science</option>
            <option value="Cybersecurity">Cybersecurity</option>
            <option value="Cloud Computing">Cloud Computing</option>
            <option value="Mobile Development">Mobile Development</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="reg-password">🔑 Password</label>
        <input type="password" id="reg-password" required placeholder="Create a strong password">
      </div>
      <div class="form-group">
        <label for="reg-role">🎓 Account Type</label>
        <select id="reg-role" required>
          <option value="user">Student (User)</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block">🚀 Create Account</button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; display: flex; justify-content: center; gap: 1.5rem;">
      <a href="index.html" style="font-size: 0.8rem; color: var(--text-secondary); text-decoration: none;">🏠 Home</a>
      <a href="admin-login.html" style="font-size: 0.8rem; color: var(--text-secondary); text-decoration: none; opacity:0.7;">🔒 Admin Portal</a>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
