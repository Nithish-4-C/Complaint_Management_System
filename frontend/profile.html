<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS - My Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-page {
      max-width: 700px;
      margin: 0 auto;
    }
    .profile-hero {
      text-align: center;
      padding: 2rem 0 1rem;
      animation: fadeInUp 0.4s ease;
    }
    .profile-hero-avatar {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.25rem;
      font-weight: 700;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
    }
    .profile-hero h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .profile-hero p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 0.2rem;
    }
    .profile-details {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 1.5rem;
      margin-top: 1.5rem;
      animation: fadeInUp 0.5s ease;
    }
    .profile-details h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid var(--border-color);
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .detail-item .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }
    .detail-item .value {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
      animation: fadeInUp 0.6s ease;
    }
    .stat-box {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-box:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
    .stat-box .stat-num { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
    .stat-box .stat-label { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem; }
    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="alert-container" class="alert-container"></div>

  <div class="app-container">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-brand">📋 CMS</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">🏠 Dashboard</a></li>
        <li><a href="dashboard.html">📁 My Complaints</a></li>
        <li><a href="profile.html" class="active">👤 Profile</a></li>
      </ul>
      <div class="nav-right">
        <div class="user-profile">
          <div class="avatar" id="user-avatar">U</div>
          <span id="user-name">User</span>
        </div>
        <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <div class="profile-page">
        <!-- Profile Hero -->
        <div class="profile-hero">
          <div class="profile-hero-avatar" id="p-avatar">U</div>
          <h2 id="p-name">Loading...</h2>
          <p id="p-role">Student</p>
        </div>

        <!-- Complaint Stats -->
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num" id="p-total">0</div>
            <div class="stat-label">Total Complaints</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="p-pending" style="color: var(--danger);">0</div>
            <div class="stat-label">Pending</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="p-resolved" style="color: var(--success);">0</div>
            <div class="stat-label">Resolved</div>
          </div>
        </div>

        <!-- Profile Details Card -->
        <div class="profile-details">
          <h3>👤 Personal Information</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <span class="label">Full Name</span>
              <span class="value" id="d-name">—</span>
            </div>
            <div class="detail-item">
              <span class="label">Register Number</span>
              <span class="value" id="d-regnum">—</span>
            </div>
            <div class="detail-item">
              <span class="label">Email Address</span>
              <span class="value" id="d-email">—</span>
            </div>
            <div class="detail-item">
              <span class="label">Phone Number</span>
              <span class="value" id="d-phone">—</span>
            </div>
            <div class="detail-item">
              <span class="label">Department</span>
              <span class="value" id="d-dept">—</span>
            </div>
            <div class="detail-item">
              <span class="label">Domain</span>
              <span class="value" id="d-domain">—</span>
            </div>
          </div>
        </div>

        <!-- Account Info -->
        <div class="profile-details" style="margin-top: 1rem;">
          <h3>🕐 Account Information</h3>
          <div class="detail-grid">
            <div class="detail-item">
              <span class="label">Account Type</span>
              <span class="value" id="d-role">—</span>
            </div>
            <div class="detail-item">
              <span class="label">Member Since</span>
              <span class="value" id="d-joined">—</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/particles.js"></script>
  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
