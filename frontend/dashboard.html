<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IssueDesk — My Dashboard</title>
  <meta name="description" content="View and manage your submitted issues on IssueDesk.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="alert-container" class="alert-container"></div>
  <div class="app-container">
    <nav class="navbar">
      <div class="nav-brand"><img src="logo.svg" alt="IssueDesk" style="width:26px;height:26px;"> IssueDesk</div>
      <ul class="nav-links">
        <li><a href="dashboard.html" class="active">🏠 Home</a></li>
        <li><a href="dashboard.html" id="nav-complaints">📁 My Issues</a></li>
        <li><a href="#" onclick="openModal(); return false;">✏️ Submit Issue</a></li>
        <li><a href="profile.html">👤 Profile</a></li>
      </ul>
      <div class="nav-right">
        <div class="user-profile">
          <div class="avatar" id="user-avatar">U</div>
          <span id="user-name">User</span>
        </div>
        <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
      </div>
    </nav>
    <main class="main-content">
      <div class="profile-card" id="profile-section">
        <div class="profile-avatar" id="profile-avatar">U</div>
        <div class="profile-info">
          <h3 id="profile-name">User</h3>
          <p id="profile-email">user@email.com</p>
          <p id="profile-total" style="margin-top:0.25rem; font-weight:600; color: var(--primary);">0 issues submitted</p>
        </div>
      </div>
      <div class="summary-grid" id="summary-cards">
        <div class="summary-card">
          <div class="summary-icon total">📊</div>
          <div class="summary-info"><h3 id="stat-total">0</h3><p>Total Issues</p></div>
        </div>
        <div class="summary-card">
          <div class="summary-icon pending">🔴</div>
          <div class="summary-info"><h3 id="stat-pending">0</h3><p>Pending</p></div>
        </div>
        <div class="summary-card">
          <div class="summary-icon progress">🟠</div>
          <div class="summary-info"><h3 id="stat-progress">0</h3><p>In Progress</p></div>
        </div>
        <div class="summary-card">
          <div class="summary-icon resolved">🟢</div>
          <div class="summary-info"><h3 id="stat-resolved">0</h3><p>Resolved</p></div>
        </div>
      </div>
      <div class="chart-section">
        <h3>📈 Issue Distribution</h3>
        <div class="chart-bars">
          <div class="chart-bar-wrapper">
            <div class="chart-bar-value" id="chart-val-pending">0</div>
            <div class="chart-bar pending-bar" id="chart-bar-pending" style="height: 4px;"></div>
            <div class="chart-bar-label">Pending</div>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar-value" id="chart-val-progress">0</div>
            <div class="chart-bar progress-bar" id="chart-bar-progress" style="height: 4px;"></div>
            <div class="chart-bar-label">In Progress</div>
          </div>
          <div class="chart-bar-wrapper">
            <div class="chart-bar-value" id="chart-val-resolved">0</div>
            <div class="chart-bar resolved-bar" id="chart-bar-resolved" style="height: 4px;"></div>
            <div class="chart-bar-label">Resolved</div>
          </div>
        </div>
      </div>
      <div class="dashboard-header">
        <h2>My Issues</h2>
        <button class="btn btn-primary" onclick="openModal()">✏️ Submit Issue</button>
      </div>
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Search by title..." oninput="handleSearch()">
        </div>
        <select class="filter-select" id="filter-status" onchange="handleFilter()">
          <option value="">All Statuses</option>
          <option value="Pending">🔴 Pending</option>
          <option value="In Progress">🟠 In Progress</option>
          <option value="Resolved">🟢 Resolved</option>
        </select>
        <select class="filter-select" id="filter-category" onchange="handleFilter()">
          <option value="">All Categories</option>
          <option value="Hostel">Hostel</option>
          <option value="Lab">Lab</option>
          <option value="Classroom">Classroom</option>
          <option value="Others">Others</option>
        </select>
        <select class="filter-select" id="sort-order" onchange="handleFilter()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
        </select>
      </div>
      <div class="complaints-grid" id="complaints-list">
        <div class="spinner-container"><div class="spinner"></div></div>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="complaint-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>✏️ Submit New Issue</h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <form id="create-complaint-form">
        <div class="form-group">
          <label for="comp-title">Title</label>
          <input type="text" id="comp-title" required placeholder="Brief title of the issue">
        </div>
        <div class="form-group">
          <label for="comp-category">Category</label>
          <select id="comp-category" required>
            <option value="Hostel">Hostel</option>
            <option value="Lab">Lab</option>
            <option value="Classroom">Classroom</option>
            <option value="Others">Others</option>
          </select>
        </div>
        <div class="form-group">
          <label for="comp-priority">Priority</label>
          <select id="comp-priority" required>
            <option value="Low">🟢 Low</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="High">🔴 High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="comp-desc">Description</label>
          <textarea id="comp-desc" rows="4" required placeholder="Detailed description of the issue"></textarea>
        </div>
        <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">🚀 Submit</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/particles.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
